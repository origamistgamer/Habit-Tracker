stages:
  - test

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

test:coverage:
  stage: test
  image: python:3.12-slim
  cache:
    paths:
      - .cache/pip
  before_script:
    - pip install -r requirements-dev.txt
  script:
    - pytest --cov=streakr --cov-report=xml --cov-report=term
  coverage: '/TOTAL.*\s+(\d+%)$/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml

codecov:
  stage: test
  image: python:3.12-slim
  needs:
    - test:coverage
  script:
    - echo "Coverage XML available for codecov upload"
  rules:
    - if: $CI_COMMIT_BRANCH
