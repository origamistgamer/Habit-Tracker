stages:
  - lint
  - audit
  - deploy

lint:frontend:
  stage: lint
  image: node:20-alpine
  script:
    - npm ci
    - npm run lint
    - npm run knip
  allow_failure: false

audit:secrets:
  stage: audit
  image:
    name: zricethezav/gitleaks:latest
    entrypoint: [""]
  script:
    - gitleaks detect --source . --verbose
  allow_failure: false

pages:
  stage: deploy
  script:
    - mkdir -p public
    - cp index.html app.js style.css manifest.json sw.js public/
  artifacts:
    paths:
      - public
  only:
    - main
