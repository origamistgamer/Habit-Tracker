stages:
  - validate
  - lint
  - format
  - deadcode
  - security

validate:
  stage: validate
  image: node:20-alpine
  script:
    - npm ci
    - npm run validate

lint:
  stage: lint
  image: node:20-alpine
  script:
    - npm ci
    - npm run lint

format:
  stage: format
  image: node:20-alpine
  script:
    - npm ci
    - npm run format

deadcode:
  stage: deadcode
  image: node:20-alpine
  script:
    - npm ci
    - npm run knip

security:
  stage: security
  image: node:20-alpine
  script:
    - npm ci
    - npm audit --audit-level=high
