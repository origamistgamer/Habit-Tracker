stages:
  - lint
  - format
  - typecheck
  - test
  - security
  - audit

lint:
  stage: lint
  image: node:20-alpine
  script:
    - npm ci
    - npm run lint

format:
  stage: format
  image: node:20-alpine
  script:
    - npm ci
    - npm run format

typecheck:
  stage: typecheck
  image: node:20-alpine
  script:
    - echo "ok"

test:
  stage: test
  image: node:20-alpine
  script:
    - echo "ok"

security:
  stage: security
  image: node:20-alpine
  script:
    - npm ci
    - npm audit --audit-level=high

audit:
  stage: audit
  image: node:20-alpine
  script:
    - npm ci
    - npm run knip
