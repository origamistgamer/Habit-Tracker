<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Streakr</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
</head>
<body>
  <div id="app">

    <!-- Top bar -->
    <header class="topbar">
      <div class="topbar-left">
        <span class="logo">streakr</span>
        <span class="month-label" id="monthLabel"></span>
      </div>
      <div class="topbar-right">
        <button class="icon-btn" id="prevMonth" title="Previous month">‹</button>
        <button class="icon-btn today-btn" id="goToday">today</button>
        <button class="icon-btn" id="nextMonth" title="Next month">›</button>
        <button class="add-btn" id="openAdd">+ habit</button>
      </div>
    </header>

    <!-- Main grid area -->
    <div class="workspace">

      <!-- Habit list + grid -->
      <div class="grid-wrap" id="gridWrap">
        <!-- Header row: day numbers -->
        <div class="grid-header">
          <div class="habit-label-col"></div>
          <div class="days-row" id="daysRow"></div>
        </div>

        <!-- Habit rows -->
        <div class="habits-body" id="habitsBody">
          <div class="empty-hint" id="emptyHint">
            <p>No habits yet —</p>
            <button onclick="document.getElementById('openAdd').click()">add your first one</button>
          </div>
        </div>
      </div>

      <!-- Right panel: summary -->
      <aside class="summary-panel" id="summaryPanel">
        <div class="summary-section">
          <div class="summary-label">today</div>
          <div class="summary-big" id="sumToday">0 / 0</div>
        </div>
        <div class="summary-section">
          <div class="summary-label">best streak</div>
          <div class="summary-big" id="sumStreak">0</div>
        </div>
        <div class="summary-section">
          <div class="summary-label">this month</div>
          <div class="summary-big" id="sumMonth">0%</div>
        </div>
        <div class="divider"></div>
        <div class="legend-section" id="habitLegend"></div>
      </aside>

    </div>
  </div>

  <!-- Modal -->
  <div class="overlay" id="overlay">
    <div class="modal" id="modal">
      <div class="modal-top">
        <span id="modalHeading">new habit</span>
        <button class="modal-close" id="modalClose">✕</button>
      </div>
      <input class="modal-input" id="habitName" type="text" placeholder="Habit name…" maxlength="36" autocomplete="off"/>
      <div class="modal-row">
        <span class="field-label">color</span>
        <div class="color-row" id="colorRow">
          <button class="cswatch active" data-c="#A78BFA" style="--sc:#A78BFA"></button>
          <button class="cswatch" data-c="#34D399" style="--sc:#34D399"></button>
          <button class="cswatch" data-c="#60A5FA" style="--sc:#60A5FA"></button>
          <button class="cswatch" data-c="#F472B6" style="--sc:#F472B6"></button>
          <button class="cswatch" data-c="#FBBF24" style="--sc:#FBBF24"></button>
          <button class="cswatch" data-c="#F87171" style="--sc:#F87171"></button>
          <button class="cswatch" data-c="#2DD4BF" style="--sc:#2DD4BF"></button>
        </div>
      </div>
      <div class="modal-actions">
        <button class="del-btn" id="delBtn" style="display:none">delete</button>
        <button class="save-btn" id="saveBtn">save</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
